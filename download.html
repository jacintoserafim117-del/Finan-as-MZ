<!DOCTYPE html>
<html lang="pt-MZ">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Finanças MZ - Download</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #00b4aa 0%, #ff7043 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .card {
            background: rgba(255,255,255,0.98);
            border-radius: 48px;
            padding: 48px 32px;
            text-align: center;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 30px 60px rgba(0,0,0,0.3);
            animation: fadeIn 0.5s ease;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .logo {
            font-size: 4rem;
            margin-bottom: 16px;
            animation: float 3s ease-in-out infinite;
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }
        
        h1 {
            background: linear-gradient(135deg, #00695c, #00b4aa);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            font-size: 1.8rem;
            margin-bottom: 8px;
        }
        
        .subtitle {
            color: #666;
            font-size: 0.8rem;
            margin-bottom: 20px;
        }
        
        .badge {
            background: linear-gradient(135deg, #ff7043, #f4511e);
            color: white;
            padding: 4px 12px;
            border-radius: 40px;
            font-size: 0.7rem;
            display: inline-block;
            margin-bottom: 24px;
        }
        
        .features {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin: 24px 0;
            text-align: left;
        }
        
        .feature {
            background: #f8f9fa;
            border-radius: 16px;
            padding: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.8rem;
            color: #2c3e50;
        }
        
        .btn {
            background: linear-gradient(135deg, #00b4aa, #00897b);
            color: white;
            border: none;
            padding: 16px 24px;
            border-radius: 60px;
            font-weight: bold;
            font-size: 1.1rem;
            width: 100%;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        
        .btn:active {
            transform: scale(0.97);
        }
        
        .success {
            background: #e8f5e9;
            border-radius: 16px;
            padding: 12px;
            margin-top: 16px;
            font-size: 0.75rem;
            color: #2e7d32;
            display: none;
        }
        
        .version {
            margin-top: 24px;
            font-size: 0.65rem;
            color: #95a5a6;
        }
        
        @media (max-width: 480px) {
            .card { padding: 32px 20px; }
            h1 { font-size: 1.5rem; }
            .features { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">💰</div>
        <h1>Finanças MZ</h1>
        <div class="subtitle">💰 A sua liberdade financeira começa aqui</div>
        <div class="badge">Versão 1.0</div>
        
        <div class="features">
            <div class="feature">📱 M-Pesa + e-Mola</div>
            <div class="feature">💰 Taxas oficiais 2026</div>
            <div class="feature">🛒 Lista de compras</div>
            <div class="feature">✅ Tarefas diárias</div>
            <div class="feature">🌙 Modo escuro</div>
            <div class="feature">🧮 Calculadora integrada</div>
        </div>
        
        <button class="btn" id="downloadBtn">
            📲 Baixar APK
        </button>
        
        <div id="successMessage" class="success">
            ✅ Download iniciado! Verifique a pasta de Downloads.
        </div>
        
        <div class="version">
            📱 Android 5.0+ • 🎯 28 MB • 🆓 Grátis • 🔒 Sem anúncios
        </div>
    </div>

    <script>
        const downloadBtn = document.getElementById('downloadBtn');
        const successMessage = document.getElementById('successMessage');
        
        // Link da Release com o nome correto do APK
        const apkUrl = 'https://github.com/jacintoserafim117-del/Finan-as-MZ/releases/download/v1.0.0/App2026.1.apk';
        
        downloadBtn.addEventListener('click', function() {
            window.location.href = apkUrl;
            
            successMessage.style.display = 'block';
            setTimeout(function() {
                successMessage.style.display = 'none';
            }, 5000);
        });
    </script>
</body>
</html>
